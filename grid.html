<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Grid Layout</title>
  <link rel="stylesheet" href="grid.css">
</head>
<body>
  <div class="grid-container">
  <div class="item green-tall-left"></div>
  <div class="item green-wide-top"></div>
  <div class="item red-top-right"></div>
  <div class="item orange-middle-left"></div>
  <div class="item red-middle-right"></div>
  <div class="item green-tall-right"></div>
  <div class="item red-bottom-left"></div>
  <div class="item orange-bottom-right"></div>
</div>

</body>
</html>
