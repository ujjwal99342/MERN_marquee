<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid with Images
    </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grid-container">
  <div class="grid-item customization">
    <img src="https://www.celebratebigday.com/wp-content/uploads/2021/05/BRK071-front.jpg" alt="Customization">
    <div class="overlay">
      <h3>Customization</h3>
      <p>Use templates or personalize with stickers and fonts.</p>
    </div>
  </div>

  <div class="grid-item scheduling">
    <img src="https://i.pinimg.com/736x/18/50/46/1850466a4ec5dc21367bf1d87d3ad66d.jpg" alt="Scheduling">
    <div class="overlay">
      <h3>Scheduling</h3>
      <p>Schedule cards and gifts to send later.</p>
    </div>
  </div>

  <div class="grid-item wallet">
    <img src="https://walletkart.in/cdn/shop/files/RAJ_5_d5852f08-0ad2-42d6-aa12-f0586585c1df_2048x.png?v=1763126009" alt="Wallet">
    <div class="overlay">
      <h3>Wallet</h3>
      <p>Access and save your gift cash.</p>
    </div>
  </div>

  <div class="grid-item send-gifts">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJ8h2jOAgdnu-mxFUBHGyIWice0Hc-yaQX_A&s" alt="Send Gifts">
    <div class="overlay">
      <h3>Send Gifts</h3>
      <p>Send gifts individually or as a group.</p>
    </div>
  </div>

  <div class="grid-item reminders">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ-6p3DiiR0wWV7lZDvG0qRhkFUfCXfM20Gdw&s" alt="Reminders">
    <div class="overlay">
      <h3>Reminders</h3>
      <p>Never miss a birthday again!</p>
    </div>
  </div>
</div>

    
</body>
</html>
